version: 2

sources:
  - name: raw_data
    description: "Raw data ingested from Kafka consumers"
    database: news_db
    schema: public
    tables:
      - name: news_sentiment
        description: "Raw financial news articles and their sentiment scores."
        columns:
          - name: article_id  
            description: "The unique ID from Finnhub"
            tests:
              - unique
              - not_null
          - name: sentiment_score
            description: "Vader sentiment score (-1.0 to 1.0)"
            tests:
              - not_null
          - name: headline
            description: "The title of the article"
            tests:
              - not_null